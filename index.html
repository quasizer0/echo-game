<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blind Beat</title>
<style>
  :root{
    --bg:#020304;
    --panel:rgba(10,14,20,.82);
    --line:rgba(255,255,255,.08);
    --text:#ecf2ff;
    --muted:#9aa8c7;
    --cyan:#74f1ff;
    --gold:#ffd76b;
    --red:#ff6f7e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:Inter,"Noto Sans TC","Segoe UI",sans-serif}
  canvas{display:block;width:100vw;height:100vh;background:#000}
  .screen{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at center, rgba(22,28,40,.30), rgba(0,0,0,.88));}
  .screen.show{display:flex}
  .panel{width:min(760px,calc(100vw - 32px));background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:28px;backdrop-filter:blur(16px);box-shadow:0 18px 60px rgba(0,0,0,.45)}
  .title{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:.08em;margin:0 0 10px}
  .subtitle{color:var(--muted);line-height:1.7;font-size:15px;margin:0}
  .statusline{margin-top:18px;color:var(--cyan);font-weight:700;font-size:14px}
  .button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:20px}
  button{appearance:none;border:0;background:#111927;color:var(--text);border:1px solid rgba(255,255,255,.08);padding:12px 16px;border-radius:14px;font:inherit;font-weight:800;cursor:pointer;transition:.18s transform,.18s background,.18s border-color}
  button:hover{transform:translateY(-1px);background:#172133;border-color:rgba(116,241,255,.30)}
  button.primary{background:linear-gradient(180deg,#122133,#0d1724);border-color:rgba(116,241,255,.34);color:#eaffff}
  button.ghost{background:rgba(255,255,255,.04)}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:22px}
  .card{border:1px solid var(--line);border-radius:18px;padding:18px;background:rgba(255,255,255,.03)}
  .card h3{margin:0 0 8px;font-size:20px}
  .card p{margin:0;color:var(--muted);line-height:1.65;font-size:14px}
  .tag{display:inline-block;margin-bottom:10px;padding:5px 10px;border-radius:999px;background:rgba(116,241,255,.08);border:1px solid rgba(116,241,255,.18);color:var(--cyan);font-size:12px;font-weight:800;letter-spacing:.08em}
  #hud{position:fixed;inset:0;pointer-events:none;padding:18px;display:none}
  #hud.show{display:block}
  .hud-block{position:absolute;background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:10px 12px;backdrop-filter:blur(8px)}
  #hudTopLeft{left:18px;top:18px;min-width:190px}
  #hudTopRight{right:18px;top:18px;text-align:right;min-width:180px}
  #hudBottom{left:50%;bottom:20px;transform:translateX(-50%);min-width:300px;text-align:center}
  .hudLabel{color:#8ca0cd;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
  .hudValue{margin-top:4px;font-size:14px;font-weight:800}
  #syncOuter{width:220px;height:10px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;border:1px solid rgba(255,255,255,.05);margin:8px auto 0}
  #syncFill{height:100%;width:0%;background:linear-gradient(90deg,#ff6f7e,#ffd76b,#74f1ff);box-shadow:0 0 12px rgba(116,241,255,.3)}
  #judgeText{position:fixed;left:50%;top:34%;transform:translate(-50%,-50%);font-weight:900;letter-spacing:.14em;font-size:32px;text-shadow:0 0 18px rgba(255,255,255,.12);pointer-events:none;opacity:0;transition:opacity .12s linear}
  #judgeText.show{opacity:1}
  #centerHint{position:fixed;left:50%;top:73%;transform:translate(-50%,-50%);font-size:14px;letter-spacing:.14em;color:rgba(236,242,255,.86);pointer-events:none;min-width:280px;text-align:center}
  #miniNotice{position:fixed;right:18px;bottom:18px;background:rgba(0,0,0,.26);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:8px 10px;font-size:12px;color:#b7c4e3;display:none}
  #miniNotice.show{display:block}
  .small{font-size:13px;color:var(--muted);line-height:1.6;margin-top:12px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="bootScreen" class="screen show">
  <div class="panel">
    <h1 class="title">BLIND BEAT</h1>
    <p class="subtitle">先確認音訊環境，再載入 1.mp3。資源就緒後才進選關。</p>
    <div id="bootStatus" class="statusline">點擊開始</div>
    <div class="button-row">
      <button id="bootBtn" class="primary">開始</button>
      <button id="retryBtn" class="ghost" style="display:none">重試載入</button>
    </div>
  </div>
</div>

<div id="menuScreen" class="screen">
  <div class="panel">
    <h1 class="title">選擇關卡</h1>
    <p class="subtitle">Level 0 先學規則。Level 1 再把硬提示拿掉。</p>
    <div class="card-grid">
      <div class="card">
        <div class="tag">LEVEL 0</div>
        <h3>90 BPM / A → B</h3>
        <p>沒有音樂。只有節拍。<br>按 <b>Space</b> 打拍維持狀態，再走到終點。</p>
        <div class="button-row"><button id="startL0" class="primary">開始</button></div>
      </div>
      <div class="card">
        <div class="tag">LEVEL 1</div>
        <h3>1.mp3 / 正式關</h3>
        <p>沒有方向字。沒有 BPM 提示。<br>聽聲辨位，同時用節奏維持狀態。</p>
        <div class="button-row"><button id="startL1" class="primary">開始</button></div>
      </div>
    </div>
    <div class="small">操作：滑鼠轉向 / W A S D 移動 / Space 打拍 / Esc 暫停</div>
  </div>
</div>

<div id="pauseScreen" class="screen">
  <div class="panel" style="max-width:520px">
    <h1 class="title">暫停</h1>
    <p class="subtitle">回到節奏，再繼續。</p>
    <div class="button-row">
      <button id="resumeBtn" class="primary">繼續</button>
      <button id="restartBtn" class="ghost">重開本關</button>
      <button id="toMenuBtn" class="ghost">回選關</button>
    </div>
  </div>
</div>

<div id="resultScreen" class="screen">
  <div class="panel" style="max-width:560px">
    <h1 id="resultTitle" class="title">完成</h1>
    <p id="resultSubtitle" class="subtitle">你成功了。</p>
    <div class="button-row">
      <button id="nextActionBtn" class="primary">回選關</button>
      <button id="retryLevelBtn" class="ghost">再玩一次</button>
    </div>
  </div>
</div>

<div id="hud">
  <div id="hudTopLeft" class="hud-block">
    <div class="hudLabel">Level</div>
    <div id="hudLevel" class="hudValue">-</div>
  </div>
  <div id="hudTopRight" class="hud-block">
    <div class="hudLabel">Guide</div>
    <div id="hudGuide" class="hudValue">-</div>
  </div>
  <div id="hudBottom" class="hud-block">
    <div id="hudMain" class="hudValue">SPACE 打拍</div>
    <div id="syncOuter"><div id="syncFill"></div></div>
  </div>
</div>

<div id="judgeText"></div>
<div id="centerHint"></div>
<div id="miniNotice">Esc：暫停</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const bootScreen = document.getElementById('bootScreen');
  const menuScreen = document.getElementById('menuScreen');
  const pauseScreen = document.getElementById('pauseScreen');
  const resultScreen = document.getElementById('resultScreen');
  const bootStatus = document.getElementById('bootStatus');
  const bootBtn = document.getElementById('bootBtn');
  const retryBtn = document.getElementById('retryBtn');
  const startL0 = document.getElementById('startL0');
  const startL1 = document.getElementById('startL1');
  const resumeBtn = document.getElementById('resumeBtn');
  const restartBtn = document.getElementById('restartBtn');
  const toMenuBtn = document.getElementById('toMenuBtn');
  const retryLevelBtn = document.getElementById('retryLevelBtn');
  const nextActionBtn = document.getElementById('nextActionBtn');
  const resultTitle = document.getElementById('resultTitle');
  const resultSubtitle = document.getElementById('resultSubtitle');

  const hud = document.getElementById('hud');
  const hudLevel = document.getElementById('hudLevel');
  const hudGuide = document.getElementById('hudGuide');
  const hudMain = document.getElementById('hudMain');
  const syncFill = document.getElementById('syncFill');
  const judgeText = document.getElementById('judgeText');
  const centerHint = document.getElementById('centerHint');
  const miniNotice = document.getElementById('miniNotice');

  const TAU = Math.PI * 2;
  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp = (a,b,t)=>a+(b-a)*t;
  const normAngle = a => {
    while (a > Math.PI) a -= TAU;
    while (a < -Math.PI) a += TAU;
    return a;
  };
  const dist = (x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1);

  let W = innerWidth, H = innerHeight, DPR = Math.min(devicePixelRatio || 1, 2);
  function resize(){
    W = innerWidth; H = innerHeight; DPR = Math.min(devicePixelRatio || 1, 2);
    canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  addEventListener('resize', resize); resize();

  const LEVELS = {
    0: {
      id: 0,
      title: 'LEVEL 0',
      bpm: 90,
      beatOffset: 0,
      useTrack: false,
      start: {x: 0, y: 0, yaw: 0},
      goal: {x: 900, y: 0, r: 58},
      worldRadius: 1200,
      baseSpeed: 120,
      syncDrainMove: 6,
      syncDrainIdle: 1.6,
      beatMissPenalty: 9,
      perfectGain: 14,
      goodGain: 8,
      missPenaltyTap: 12,
      listenBeats: 8,
    },
    1: {
      id: 1,
      title: 'LEVEL 1',
      bpm: 103,
      beatOffset: 19.2427,
      useTrack: true,
      start: {x: 0, y: 0, yaw: 0},
      goalNodes: [
        {x: 220, y: -180, r: 90},
        {x: 520, y: 120, r: 100},
        {x: 820, y: -120, r: 100},
        {x: 1060, y: 40, r: 70},
      ],
      worldRadius: 1350,
      baseSpeed: 100,
      syncDrainMove: 7,
      syncDrainIdle: 2,
      beatMissPenalty: 10,
      perfectGain: 12,
      goodGain: 7,
      missPenaltyTap: 13,
      listenBeats: 4,
    }
  };

  const state = {
    screen: 'boot', // boot menu play pause result
    levelId: null,
    resultType: null,
    started: false,
    assetsReady: false,
    paused: false,
    pointerWanted: false,
    judgeShow: 0,
    judgeLabel: '',
    judgeColor: '#ecf2ff',
    tapRing: 0,
    tapRingStrong: 0,
    winFlash: 0,
    missFlash: 0,
    beatPulse: 0,
    guidePulse: 0,
    level1NodeIndex: 0,
    playPhase: 'idle',
    runStartBeat: 0,
  };

  const input = { keys: new Set(), locked: false };

  const player = { x:0, y:0, yaw:0, speed:0, sync:100 };

  const rhythm = {
    anchor: 0,
    interval: 60 / 90,
    lastProcessedBeat: -1,
    tappedBeats: new Set(),
    lastTapBeat: null,
  };

  const audio = {
    ctx: null,
    master: null,
    sfxBus: null,
    musicBus: null,
    musicLP: null,
    musicPan: null,
    musicGain: null,
    trackBuffer: null,
    activeTrack: null,
    trackStartContext: 0,
    trackOffset: 0,
    loading: false,
  };

  function showOnly(screen){
    [bootScreen, menuScreen, pauseScreen, resultScreen].forEach(el=>el.classList.remove('show'));
    if (screen === 'boot') bootScreen.classList.add('show');
    if (screen === 'menu') menuScreen.classList.add('show');
    if (screen === 'pause') pauseScreen.classList.add('show');
    if (screen === 'result') resultScreen.classList.add('show');
    hud.classList.toggle('show', screen === 'play');
    miniNotice.classList.toggle('show', screen === 'play');
    state.screen = screen;
    if (screen !== 'play') releasePointer();
  }

  function releasePointer(){
    if (document.pointerLockElement === canvas) document.exitPointerLock();
  }

  function ensureAudio(){
    if (audio.ctx) return;
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    audio.ctx = ac;
    audio.master = ac.createGain();
    audio.master.gain.value = 0.92;
    audio.master.connect(ac.destination);
    audio.sfxBus = ac.createGain();
    audio.sfxBus.gain.value = 0.95;
    audio.sfxBus.connect(audio.master);
    audio.musicBus = ac.createGain();
    audio.musicBus.gain.value = 1;
    audio.musicPan = ac.createStereoPanner();
    audio.musicLP = ac.createBiquadFilter();
    audio.musicLP.type = 'lowpass';
    audio.musicLP.frequency.value = 18000;
    audio.musicGain = ac.createGain();
    audio.musicGain.gain.value = 0.0001;
    audio.musicBus.connect(audio.musicLP);
    audio.musicLP.connect(audio.musicGain);
    audio.musicGain.connect(audio.musicPan);
    audio.musicPan.connect(audio.master);
  }

  async function loadAssets(){
    if (audio.loading) return;
    audio.loading = true;
    retryBtn.style.display = 'none';
    bootStatus.textContent = '建立音訊環境…';
    try {
      ensureAudio();
      await audio.ctx.resume();
      bootStatus.textContent = '載入 1.mp3…';
      const res = await fetch('./1.mp3', { cache: 'no-store' });
      if (!res.ok) throw new Error('找不到 1.mp3');
      const arr = await res.arrayBuffer();
      bootStatus.textContent = '解碼音軌…';
      audio.trackBuffer = await audio.ctx.decodeAudioData(arr.slice(0));
      state.assetsReady = true;
      bootStatus.textContent = '資源已就緒';
      showOnly('menu');
    } catch (err) {
      console.error(err);
      state.assetsReady = false;
      bootStatus.textContent = `載入失敗：${err.message}`;
      retryBtn.style.display = 'inline-flex';
    } finally {
      audio.loading = false;
    }
  }

  function makeOsc({when, freq=440, type='sine', gain=0.08, decay=0.12, pan=0, sweep=null}){
    const osc = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    const p = audio.ctx.createStereoPanner();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, when);
    if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(1, sweep), when + decay);
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(gain, when + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, when + decay);
    p.pan.value = clamp(pan, -1, 1);
    osc.connect(g); g.connect(p); p.connect(audio.sfxBus);
    osc.start(when); osc.stop(when + decay + 0.03);
  }

  function playMetronome(when, accent=false){
    makeOsc({when, freq: accent ? 132 : 110, type:'triangle', gain: accent ? 0.11 : 0.08, decay:0.08, sweep: accent ? 70 : 62});
    makeOsc({when, freq: 1800, type:'square', gain: accent ? 0.022 : 0.016, decay:0.02, sweep:800});
  }

  function playTapFeedback(kind){
    const now = audio.ctx.currentTime;
    if (kind === 'perfect') {
      makeOsc({when: now, freq: 660, type:'triangle', gain:0.07, decay:0.10, sweep:880});
      makeOsc({when: now + 0.04, freq: 880, type:'sine', gain:0.045, decay:0.08, sweep:940});
    } else if (kind === 'good') {
      makeOsc({when: now, freq: 540, type:'triangle', gain:0.055, decay:0.09, sweep:650});
    } else {
      makeOsc({when: now, freq: 200, type:'square', gain:0.06, decay:0.09, sweep:110});
    }
  }

  function playWin(){
    const now = audio.ctx.currentTime;
    [523.25,659.25,783.99].forEach((f,i)=>makeOsc({when:now+i*0.08,freq:f,type:'sine',gain:0.075,decay:0.24,sweep:f*1.03}));
  }

  function stopTrack(){
    if (audio.activeTrack) {
      try { audio.activeTrack.stop(); } catch {}
      try { audio.activeTrack.disconnect(); } catch {}
      audio.activeTrack = null;
    }
  }

  function getTrackPlaybackTime(){
    if (!audio.trackBuffer) return 0;
    const dur = audio.trackBuffer.duration;
    return ((audio.ctx.currentTime - audio.trackStartContext) % dur + dur) % dur;
  }

  function startTrack(offset = 0){
    if (!audio.trackBuffer) return;
    stopTrack();
    const source = audio.ctx.createBufferSource();
    source.buffer = audio.trackBuffer;
    source.loop = true;
    source.connect(audio.musicBus);
    const when = audio.ctx.currentTime + 0.05;
    source.start(when, offset % audio.trackBuffer.duration);
    audio.trackStartContext = when - offset;
    audio.trackOffset = offset;
    audio.activeTrack = source;
  }

  function beginLevel(id){
    ensureAudio();
    audio.ctx.resume();
    state.levelId = id;
    state.level1NodeIndex = 0;
    state.resultType = null;
    state.paused = false;
    state.tapRing = 0;
    state.tapRingStrong = 0;
    state.winFlash = 0;
    state.missFlash = 0;
    state.beatPulse = 0;
    state.guidePulse = 0;
    judgeText.classList.remove('show');
    const lvl = LEVELS[id];
    state.playPhase = 'listen';
    state.runStartBeat = lvl.listenBeats || 0;
    centerHint.textContent = id === 0 ? `先聽 ${state.runStartBeat} 拍，再開始前進` : `先聽 ${state.runStartBeat} 拍，再追聲音`;
    player.x = lvl.start.x; player.y = lvl.start.y; player.yaw = lvl.start.yaw; player.speed = 0; player.sync = 100;

    rhythm.interval = 60 / lvl.bpm;
    rhythm.tappedBeats.clear();
    rhythm.lastTapBeat = null;

    const baseStart = audio.ctx.currentTime + 0.55;
    if (lvl.useTrack) {
      startTrack(0);
      rhythm.anchor = audio.trackStartContext + lvl.beatOffset;
    } else {
      stopTrack();
      rhythm.anchor = baseStart;
      audio.musicGain.gain.setValueAtTime(0.0001, audio.ctx.currentTime);
    }
    rhythm.lastProcessedBeat = Math.floor((audio.ctx.currentTime - rhythm.anchor) / rhythm.interval) - 1;

    showOnly('play');
    canvas.focus?.();
    requestPointer();
    updateHud();
  }

  function requestPointer(){
    state.pointerWanted = true;
    if (state.screen === 'play' && document.pointerLockElement !== canvas) {
      canvas.requestPointerLock?.();
    }
  }

  function pauseGame(reason='pause'){
    if (state.screen !== 'play') return;
    state.paused = true;
    if (LEVELS[state.levelId].useTrack && audio.activeTrack) {
      audio.trackOffset = getTrackPlaybackTime();
      stopTrack();
    }
    showOnly('pause');
  }

  function resumeGame(){
    if (state.screen !== 'pause') return;
    state.paused = false;
    if (LEVELS[state.levelId].useTrack) {
      startTrack(audio.trackOffset || 0);
      rhythm.anchor = audio.trackStartContext + LEVELS[state.levelId].beatOffset;
    }
    const nowBeat = Math.floor((audio.ctx.currentTime - rhythm.anchor) / rhythm.interval);
    rhythm.lastProcessedBeat = nowBeat - 1;
    showOnly('play');
    requestPointer();
  }

  function endLevel(win, subtitle){
    state.resultType = win ? 'win' : 'fail';
    if (LEVELS[state.levelId].useTrack) {
      audio.trackOffset = getTrackPlaybackTime();
      stopTrack();
    }
    releasePointer();
    resultTitle.textContent = win ? '完成' : '失敗';
    resultSubtitle.textContent = subtitle;
    nextActionBtn.textContent = '回選關';
    showOnly('result');
  }

  function beatJudge(){
    if (state.screen !== 'play') return;
    const lvl = LEVELS[state.levelId];
    const t = audio.ctx.currentTime;
    const n = Math.round((t - rhythm.anchor) / rhythm.interval);
    const nearest = rhythm.anchor + n * rhythm.interval;
    const err = Math.abs(t - nearest);

    let result = 'miss';
    if (err <= 0.055) result = 'perfect';
    else if (err <= 0.11) result = 'good';

    if (rhythm.lastTapBeat === n && err <= 0.11) return; // prevent spam on same beat
    rhythm.lastTapBeat = n;

    const trainingOnly = state.playPhase !== 'run';

    if (result === 'perfect') {
      if (!trainingOnly) {
        player.sync = clamp(player.sync + lvl.perfectGain, 0, 100);
        rhythm.tappedBeats.add(n);
      }
      showJudge(trainingOnly ? 'READY' : 'PERFECT', '#74f1ff');
      state.tapRing = 1; state.tapRingStrong = 1; state.guidePulse = 1;
    } else if (result === 'good') {
      if (!trainingOnly) {
        player.sync = clamp(player.sync + lvl.goodGain, 0, 100);
        rhythm.tappedBeats.add(n);
      }
      showJudge(trainingOnly ? 'OK' : 'GOOD', '#ffd76b');
      state.tapRing = 0.82; state.tapRingStrong = 0;
    } else {
      if (!trainingOnly) {
        player.sync = clamp(player.sync - lvl.missPenaltyTap, 0, 100);
      }
      showJudge(trainingOnly ? 'EARLY/LATE' : 'MISS', '#ff6f7e');
      state.tapRing = 0.45; state.tapRingStrong = 0; state.missFlash = trainingOnly ? 0.25 : 0.65;
    }
    playTapFeedback(result);
  }

  function showJudge(label, color){
    state.judgeLabel = label;
    state.judgeColor = color;
    state.judgeShow = 0.34;
    judgeText.textContent = label;
    judgeText.style.color = color;
    judgeText.classList.add('show');
  }

  function currentTarget(){
    if (state.levelId === 0) return LEVELS[0].goal;
    return LEVELS[1].goalNodes[Math.min(state.level1NodeIndex, LEVELS[1].goalNodes.length - 1)];
  }

  function updateBeatProgress(){
    const lvl = LEVELS[state.levelId];
    const now = audio.ctx.currentTime;
    const beatNow = Math.floor((now - rhythm.anchor) / rhythm.interval);
    while (rhythm.lastProcessedBeat < beatNow) {
      rhythm.lastProcessedBeat++;
      const beatId = rhythm.lastProcessedBeat;
      if (beatId < 0) continue;
      if (state.levelId === 0) {
        playMetronome(rhythm.anchor + beatId * rhythm.interval, beatId % 4 === 0);
      }
      if (beatId < state.runStartBeat) {
        if (beatId === state.runStartBeat - 1) {
          state.playPhase = 'run';
          rhythm.tappedBeats.clear();
          centerHint.textContent = state.levelId === 0 ? '開始：踩拍前進' : '開始：用節奏維持狀態';
          showJudge('START', '#74f1ff');
          state.guidePulse = 1;
        }
      } else if (!rhythm.tappedBeats.has(beatId)) {
        player.sync = clamp(player.sync - lvl.beatMissPenalty, 0, 100);
        state.missFlash = Math.max(state.missFlash, 0.28);
      }
      if (rhythm.tappedBeats.size > 20) {
        // keep set small
        const threshold = beatId - 8;
        for (const v of rhythm.tappedBeats) if (v < threshold) rhythm.tappedBeats.delete(v);
      }
      if (state.levelId === 0) state.beatPulse = 1;
    }
  }

  function updateSpatialMusic(){
    if (state.levelId !== 1 || !audio.activeTrack) return;
    const target = currentTarget();
    const dx = target.x - player.x;
    const dy = target.y - player.y;
    const d = Math.hypot(dx, dy);
    const angle = Math.atan2(dy, dx);
    const rel = normAngle(angle - player.yaw);
    const pan = clamp(Math.sin(rel), -1, 1);
    const near = 100, far = 1700;
    let t = 1 - clamp((d - near) / (far - near), 0, 1);
    const clarity = Math.pow(t, 1.2);
    const floor = 0.11; // far ambience remains
    const facing = lerp(0.82, 1.0, 1 - Math.abs(rel) / Math.PI);
    const syncFactor = lerp(0.82, 1.0, player.sync / 100);
    audio.musicPan.pan.setTargetAtTime(pan, audio.ctx.currentTime, 0.03);
    audio.musicGain.gain.setTargetAtTime((lerp(floor, 1.0, clarity) * facing * syncFactor), audio.ctx.currentTime, 0.05);
    audio.musicLP.frequency.setTargetAtTime(lerp(1400, 18000, clarity) * syncFactor, audio.ctx.currentTime, 0.08);
  }

  function update(dt){
    if (state.screen !== 'play' || state.paused) return;
    const lvl = LEVELS[state.levelId];
    updateBeatProgress();
    updateSpatialMusic();

    state.tapRing = Math.max(0, state.tapRing - dt * 2.1);
    state.tapRingStrong = Math.max(0, state.tapRingStrong - dt * 2.6);
    state.winFlash = Math.max(0, state.winFlash - dt * 1.6);
    state.missFlash = Math.max(0, state.missFlash - dt * 2.0);
    state.beatPulse = Math.max(0, state.beatPulse - dt * 2.8);
    state.guidePulse = Math.max(0, state.guidePulse - dt * 2.0);
    state.judgeShow = Math.max(0, state.judgeShow - dt);
    if (state.judgeShow <= 0) judgeText.classList.remove('show');

    let mx = 0, my = 0;
    if (input.keys.has('KeyW')) my += 1;
    if (input.keys.has('KeyS')) my -= 1;
    if (input.keys.has('KeyA')) mx -= 1;
    if (input.keys.has('KeyD')) mx += 1;
    const len = Math.hypot(mx, my);
    if (len > 0) { mx /= len; my /= len; }
    const moving = len > 0;

    const inRun = state.playPhase === 'run';
    const syncNorm = clamp(player.sync / 100, 0, 1);
    const moveFactor = lerp(0.18, 1.0, syncNorm);
    const speed = inRun ? lvl.baseSpeed * moveFactor : 0;
    player.speed = moving ? speed : 0;

    const cos = Math.cos(player.yaw), sin = Math.sin(player.yaw);
    const forwardX = cos, forwardY = sin;
    const rightX = -sin, rightY = cos;

    player.x += (forwardX * my + rightX * mx) * speed * dt;
    player.y += (forwardY * my + rightY * mx) * speed * dt;

    const r = Math.hypot(player.x, player.y);
    if (r > lvl.worldRadius) {
      const a = Math.atan2(player.y, player.x);
      player.x = Math.cos(a) * lvl.worldRadius;
      player.y = Math.sin(a) * lvl.worldRadius;
    }

    if (inRun) {
      player.sync = clamp(player.sync - dt * (moving ? lvl.syncDrainMove : lvl.syncDrainIdle), 0, 100);
    }

    if (inRun && player.sync <= 0) {
      endLevel(false, '節奏掉了。重新抓拍。');
      return;
    }

    if (state.levelId === 0) {
      const g = lvl.goal;
      if (dist(player.x, player.y, g.x, g.y) <= g.r) {
        state.winFlash = 1; playWin();
        endLevel(true, '你把節奏帶到了終點。');
        return;
      }
    } else {
      const node = currentTarget();
      if (dist(player.x, player.y, node.x, node.y) <= node.r) {
        if (state.level1NodeIndex < LEVELS[1].goalNodes.length - 1) {
          state.level1NodeIndex++;
          state.guidePulse = 1;
        } else {
          state.winFlash = 1; playWin();
          endLevel(true, '你找到真正的聲源了。');
          return;
        }
      }
    }

    updateHud();
  }

  function updateHud(){
    const lvl = LEVELS[state.levelId];
    if (!lvl) return;
    hudLevel.textContent = lvl.title;
    syncFill.style.width = `${player.sync.toFixed(1)}%`;

    if (state.playPhase !== 'run') {
      hudGuide.textContent = state.levelId === 0 ? '先聽拍子' : '先聽音樂';
      hudMain.textContent = '現在先不要急，先聽再按 SPACE';
      return;
    }

    if (state.levelId === 0) {
      const g = lvl.goal;
      const dx = g.x - player.x, dy = g.y - player.y;
      const d = Math.round(Math.hypot(dx, dy));
      const rel = normAngle(Math.atan2(dy, dx) - player.yaw);
      let dir = '前方';
      if (Math.abs(rel) > 0.35) dir = rel > 0 ? '右前' : '左前';
      if (Math.abs(rel) > 1.6) dir = rel > 0 ? '右後' : '左後';
      hudGuide.textContent = `${dir} / ${d} m`;
      hudMain.textContent = 'SPACE 對拍，W 前進';
    } else {
      hudGuide.textContent = ['更穩', '更真', '更清楚', '快到了'][Math.min(state.level1NodeIndex, 3)];
      hudMain.textContent = 'SPACE 維持節奏';
    }
  }

  function drawBackground(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);
    const glow = Math.max(state.tapRing * 0.28, state.tapRingStrong * 0.45, state.guidePulse * 0.16);
    const g = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.52);
    g.addColorStop(0, `rgba(255,255,255,${0.01 + glow*0.06})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
  }

  function drawCrosshair(){
    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.strokeStyle = 'rgba(225,235,255,.32)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.moveTo(0,-8); ctx.lineTo(0,8); ctx.stroke();
    ctx.restore();
  }

  function drawTapRing(){
    const intensity = Math.max(state.tapRing, state.tapRingStrong*1.15);
    if (intensity <= 0.01 && state.screen === 'play') return;
    const strong = state.tapRingStrong > 0.01;
    const r = strong ? 14 + (1 - state.tapRingStrong) * 88 : 12 + (1 - state.tapRing) * 58;
    ctx.save(); ctx.translate(W/2,H/2);
    ctx.beginPath(); ctx.arc(0,0,r,0,TAU);
    ctx.strokeStyle = strong ? `rgba(116,241,255,${0.08 + intensity*0.22})` : `rgba(255,215,107,${0.07 + intensity*0.16})`;
    ctx.lineWidth = strong ? 1.8 : 1.35; ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,strong?2.4:1.9,0,TAU);
    ctx.fillStyle = strong ? `rgba(220,244,255,${0.18 + intensity*0.20})` : `rgba(255,231,170,${0.11 + intensity*0.12})`;
    ctx.fill();
    ctx.restore();
  }

  function drawTrainingBeat(){
    if (state.screen !== 'play' || state.levelId !== 0) return;
    const a = 0.04 + state.beatPulse * 0.12;
    ctx.save();
    ctx.fillStyle = `rgba(116,241,255,${a})`;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  function drawMissFlash(){
    if (state.missFlash <= 0.01) return;
    ctx.fillStyle = `rgba(255,70,90,${state.missFlash * 0.14})`;
    ctx.fillRect(0,0,W,H);
  }

  function drawWinFlash(){
    if (state.winFlash <= 0.01) return;
    ctx.fillStyle = `rgba(116,241,255,${state.winFlash * 0.18})`;
    ctx.fillRect(0,0,W,H);
  }

  function drawDebugMap(){
    // dev hidden on Shift+F2 could be added later; omitted for player build
  }

  function render(){
    drawBackground();
    drawTrainingBeat();
    drawCrosshair();
    drawTapRing();
    drawMissFlash();
    drawWinFlash();
    drawDebugMap();
  }

  let last = performance.now() / 1000;
  function frame(){
    const now = performance.now() / 1000;
    const dt = Math.min(0.033, now - last);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  bootBtn.addEventListener('click', loadAssets);
  retryBtn.addEventListener('click', loadAssets);
  startL0.addEventListener('click', ()=>beginLevel(0));
  startL1.addEventListener('click', ()=>{
    if (!state.assetsReady) return;
    beginLevel(1);
  });
  resumeBtn.addEventListener('click', resumeGame);
  restartBtn.addEventListener('click', ()=>beginLevel(state.levelId));
  retryLevelBtn.addEventListener('click', ()=>beginLevel(state.levelId));
  toMenuBtn.addEventListener('click', ()=>showOnly('menu'));
  nextActionBtn.addEventListener('click', ()=>showOnly('menu'));

  document.addEventListener('pointerlockchange', ()=>{
    input.locked = document.pointerLockElement === canvas;
    if (state.screen === 'play' && state.pointerWanted && !input.locked) {
      pauseGame('unlock');
    }
    if (input.locked) state.pointerWanted = false;
  });

  document.addEventListener('mousemove', e=>{
    if (state.screen !== 'play' || !input.locked) return;
    player.yaw += e.movementX * 0.0026;
  });

  document.addEventListener('keydown', e=>{
    if (e.repeat && e.code === 'Space') return;
    input.keys.add(e.code);

    if (e.code === 'Escape') {
      e.preventDefault();
      if (state.screen === 'play') pauseGame('esc');
      else if (state.screen === 'pause') resumeGame();
      return;
    }

    if (e.code === 'Space') {
      e.preventDefault();
      if (state.screen === 'play') beatJudge();
    }
  });

  document.addEventListener('keyup', e=>input.keys.delete(e.code));

  canvas.addEventListener('click', ()=>{
    if (state.screen === 'play' && !input.locked) requestPointer();
  });

  window.addEventListener('blur', ()=>{ if (state.screen === 'play') pauseGame('blur'); });
  document.addEventListener('visibilitychange', ()=>{ if (document.hidden && state.screen === 'play') pauseGame('hidden'); });

  // initial render
  render();
})();
</script>
</body>
</html>
